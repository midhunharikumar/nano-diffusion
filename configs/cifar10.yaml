dataset: cifar10
img_size: 32
channels: 3
num_classes: 10

# model
patch_size: 4
hidden_dim: 256
depth: 6
num_heads: 4

# training
batch_size: 256
epochs: 100
lr: 1e-4
ema_decay: 0.9999
grad_clip: 1.0
cfg_dropout: 0.1
num_workers: 0

# eval / sampling
eval_interval: 500
n_sample_steps: 50
cfg_scale: 3.0
n_per_class: 8
fid_every_n_epochs: 5
fid_samples: 2048

# logging
wandb_project: nano-diffusion
run_name: cifar10-smoke

# device: mps (Apple Silicon), cuda, or cpu
device: mps

# semantic routing — arxiv 2602.03510
# set use_semantic_routing: true and pick an llm_model_name to enable
# the LLM is frozen; only the DepthwiseRouter weights + cross-attn are trained
use_semantic_routing: false
# llm_model_name: google/gemma-3-1b      # gemma3:270m equivalent on HuggingFace
# llm_model_name: Qwen/Qwen3-0.6B        # qwen3.5:0.8b equivalent on HuggingFace

# gradient checkpointing — 0=off, 1=every block (~33% overhead), 2=every other (~17% overhead)
checkpoint_every: 0
