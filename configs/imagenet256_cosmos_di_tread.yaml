dataset: imagenet_256x256
streaming: true
steps_per_epoch: 5000
img_size: 256
channels: 6        # informational; DiT uses len(fsq_levels) in tokenizer mode
num_classes: 1000

# Best cosmos-DI recipe + TREAD.
# Cosmos DISCRETE tokenizer — exposes both the continuous pre-quant codes
# (diffusion target) and the FSQ codebook indices (cross-entropy target).
# DI8x8 compresses 256px → 32×32 latent grid with 6 FSQ channels.
use_tokenizer: true
tokenizer_name: Cosmos-0.1-Tokenizer-DI8x8
latent_scale: 1.0
latent_shift: 0.0

# Mixed objective: diffusion MSE on continuous codes + factorised cross-entropy
# on the discrete FSQ levels (arxiv 2501.03575 tokenizer). Small beta → aux
# regulariser, not a co-equal objective.
use_codebook_ce: true
code_ce_beta: 0.1
mse_weight: 1.0
ce_output: false

# model — latent grid 32×32×6; patch_size=2 → 256 tokens
patch_size: 2
hidden_dim: 768
depth: 12
num_heads: 8

# training — levers proven on imagenet64 (RESULTS.md): small batch + high LR +
# short warmup + no grad checkpointing maximise optimizer steps in the 600s budget.
batch_size: 256
grad_accum_steps: 1   # effective batch = batch_size × grad_accum_steps
shifted_t: false
epochs: 50
lr: 8e-4
warmup_steps: 100
ema_decay: 0.9999
grad_clip: 1.0
cfg_dropout: 0.1
num_workers: 8

checkpoint_every: 0

# eval / sampling
eval_interval: 500
n_sample_steps: 50
cfg_scale: 3.0
n_per_class: 8
n_log_classes: 10
fid_every_n_epochs: 5
fid_samples: 2048

# logging
wandb_project: nano-diffusion
run_name: imagenet256-cosmos-di-tread

# device
device: cuda

use_semantic_routing: false
use_reg: false       # incompatible with tokenizer mode

# TREAD: token routing for training efficiency (compvis/tread).
# Training-only — teleported tokens re-enter before norm_out, so the full 32×32
# latent grid is present for both the diffusion regression and codebook-CE heads.
# depth=12 → route through blocks 2..8 (six bypassed blocks); ~half the patch
# tokens skip those blocks each step → more optimizer steps in the 600s budget.
use_tread: true
tread_selection_rate: 0.5
tread_route_start: 2
tread_route_end: 8

gcp_bucket: ""
compile: true
