dataset: mnist
streaming: false
img_size: 32
channels: 1
num_classes: 10

# model
patch_size: 4
hidden_dim: 256
depth: 6
num_heads: 4

# training
batch_size: 256
grad_accum_steps: 1          # effective batch = batch_size × grad_accum_steps
shifted_t: false             # resolution-shifted logit-normal timesteps (arxiv 2301.11093)
epochs: 50
lr: 1e-4
ema_decay: 0.9999
grad_clip: 1.0
cfg_dropout: 0.1
num_workers: 4

# eval / sampling
eval_interval: 500
n_sample_steps: 50
cfg_scale: 3.0
n_per_class: 8
fid_every_n_epochs: 5
fid_samples: 2048

# logging
wandb_project: nano-diffusion
run_name: mnist-smoke

# device: mps (Apple Silicon), cuda, or cpu
device: mps

# semantic routing — arxiv 2602.03510
# set use_semantic_routing: true and pick an llm_model_name to enable
# the LLM is frozen; only the DepthwiseRouter weights + cross-attn are trained
use_semantic_routing: false
# llm_model_name: google/gemma-3-1b      # gemma3:270m equivalent on HuggingFace
# llm_model_name: Qwen/Qwen3-0.6B        # qwen3.5:0.8b equivalent on HuggingFace

# REG — arxiv 2507.01467
use_reg: false
# reg_model_name: facebook/dinov2-base
reg_beta: 0.03

# gradient checkpointing — 0=off, 1=every block (~33% overhead), 2=every other (~17% overhead)
checkpoint_every: 0

# TREAD: token routing for training efficiency (compvis/tread)
# depth=6: blocks 1-4 see 50% of tokens; blocks 0 and 5 see full sequence
use_tread: false
tread_selection_rate: 0.5
tread_route_start: 1
tread_route_end: 4

# MaskGIT-style token dropout — removes patch tokens from the entire forward pass
use_maskgit: false
maskgit_ratio: 0.5

# MoE FFN with Expert Choice routing
use_moe: false
moe_num_experts: 8        # total SwiGLU experts per MoE block
moe_num_always_on: 1      # dense experts that see every token; rest are routed
moe_capacity_factor: 1.25 # each routed expert's token budget (1.0 = fair share)
moe_every_n: 2            # apply MoE to every Nth block; remaining blocks stay dense

# GCS checkpoint upload (leave empty to disable)
gcp_bucket: ""

compile: true
