dataset: mnist
img_size: 32
channels: 1
num_classes: 10

# model
patch_size: 4
hidden_dim: 256
depth: 6
num_heads: 4

# training
batch_size: 256
epochs: 50
lr: 1e-4
ema_decay: 0.9999
grad_clip: 1.0
cfg_dropout: 0.1
num_workers: 0

# eval / sampling
eval_interval: 500
n_sample_steps: 50
cfg_scale: 3.0
n_per_class: 8
fid_every_n_epochs: 5
fid_samples: 2048

# logging
wandb_project: nano-diffusion
run_name: mnist-smoke

# device: mps (Apple Silicon), cuda, or cpu
device: mps
